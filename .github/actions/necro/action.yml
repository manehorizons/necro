name: necro
description: Run necro static analysis, write SARIF, and surface findings in code-scanning.
author: manehorizons

inputs:
  path:
    description: Directory or file to scan.
    required: false
    default: "."
  fail-on:
    description: Fail the job if a finding at/above this severity exists (high | medium | low). Leave empty to never fail the job (surface-only).
    required: false
    default: high
  sarif-file:
    description: Path to write the SARIF 2.1.0 report to.
    required: false
    default: necro.sarif
  version:
    description: npm version or dist-tag of @manehorizons/necro to run.
    required: false
    default: latest
  upload:
    description: Upload the SARIF to GitHub code-scanning.
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: 20

    - name: Run necro
      shell: bash
      # Inputs are passed via env (not interpolated into the script) to avoid
      # expression injection.
      env:
        NECRO_PATH: ${{ inputs.path }}
        NECRO_FAIL_ON: ${{ inputs['fail-on'] }}
        NECRO_SARIF: ${{ inputs['sarif-file'] }}
        NECRO_VERSION: ${{ inputs.version }}
      run: |
        args=(scan "$NECRO_PATH" --sarif "$NECRO_SARIF")
        if [ -n "$NECRO_FAIL_ON" ]; then
          args+=(--fail-on "$NECRO_FAIL_ON")
        fi
        npx -y "@manehorizons/necro@$NECRO_VERSION" "${args[@]}"

    - name: Upload SARIF to code-scanning
      # always() so findings surface even when --fail-on fails the run above.
      if: ${{ always() && inputs.upload == 'true' }}
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ${{ inputs['sarif-file'] }}
