name: Release

# Publishes @manehorizons/necro to npm when a v* tag is pushed.
# Release flow: bump package.json (npm version X.Y.Z), commit, then
#   git tag vX.Y.Z && git push origin main --tags
# The job below refuses to publish if the tag and package.json disagree.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # npm provenance (public repo + OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Guard — tag must match package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION="$(node -p "require('./package.json').version")"
          echo "tag=$TAG_VERSION package.json=$PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      # prepublishOnly rebuilds the bundle; --access public is required for a
      # scoped package. --provenance attaches a signed build attestation (needs
      # a public repo + id-token: write, both satisfied here).
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
