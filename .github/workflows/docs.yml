name: Docs

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/docs.yml"
  # Deploy is manual until GitHub Pages is enabled for this repo.
  # (Pages on a private repo requires a paid plan; on push we only validate the build.)
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Validates the site (and the link-validation gate) on every push.
      - name: Build site
        run: npm run build

      # Pages steps only run on a manual dispatch, after Pages is enabled
      # (Settings -> Pages -> Source: GitHub Actions).
      - name: Configure Pages
        if: github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v6

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v5
        with:
          # path is resolved from the repository root.
          path: website/dist

  deploy:
    # Only deploy on a manual run; the push build above is validation-only.
    if: github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
